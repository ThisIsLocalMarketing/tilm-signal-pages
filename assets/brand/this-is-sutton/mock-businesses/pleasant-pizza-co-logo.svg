<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Pleasant Pizza Co. mock logo</title>
  <desc id="desc">A fictional cream and tomato-red pizza restaurant logo with a pizza slice emblem.</desc>
  <defs>
    <linearGradient id="cream" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5dc"/>
      <stop offset="1" stop-color="#efd5a4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#251a14" flood-opacity=".24"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="12" y="12" width="696" height="216" rx="48" fill="url(#cream)" stroke="#b54130" stroke-width="6"/>
    <circle cx="120" cy="120" r="78" fill="#b54130"/>
    <circle cx="120" cy="120" r="65" fill="#2d251f" stroke="#f0cb83" stroke-width="4"/>
    <path d="M84 76 L167 93 L108 166 Z" fill="#efc56f" stroke="#fff0c8" stroke-width="5" stroke-linejoin="round"/>
    <path d="M84 76 Q126 59 167 93" fill="none" stroke="#b54130" stroke-width="13" stroke-linecap="round"/>
    <circle cx="120" cy="105" r="8" fill="#b54130"/>
    <circle cx="139" cy="119" r="8" fill="#b54130"/>
    <path d="M111 134 q16 -12 30 1" fill="none" stroke="#45704e" stroke-width="7" stroke-linecap="round"/>
    <text x="222" y="113" fill="#2d251f" font-family="Georgia, 'Times New Roman', serif" font-size="69" font-weight="700" letter-spacing="1">Pleasant</text>
    <text x="226" y="166" fill="#b54130" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" letter-spacing="8">PIZZA CO.</text>
    <path d="M228 184 H640" stroke="#c58b4f" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
